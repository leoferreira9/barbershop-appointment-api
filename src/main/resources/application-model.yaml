spring:
  application:
    name: barbershop.appointment

  datasource:
    url: jdbc:mysql://localhost:3306/barbershop_appointment_db?useSSL=false&serverTimezone=UTC
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true